<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220" role="img" aria-label="HIBANA - Affine Multiparty Session Types for Rust">
  <defs>
    <style>
      .bg-flame {
        opacity: 0.60;
      }
      .title {
        fill: #0B1020;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        font-weight: 800;
        font-size: 72px;
        letter-spacing: 0.15em;
      }
      .subtitle {
        fill: #475569;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        font-weight: 500;
        font-size: 18px;
      }
      .features {
        fill: #64748b;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        font-weight: 400;
        font-size: 14px;
      }
      .charcoal{ stroke:#0B1020; fill:#0B1020; }
      .flame1{ fill:#FF6B35; }
      .flame2{ fill:#FF8C42; }
      .glow-tip {
        fill: #FF8C42;
        animation: glow 2s ease-in-out infinite;
      }
      @keyframes glow {
        0%, 100% {
          fill: #FF8C42;
          filter: drop-shadow(0 0 3px #FF6B35) drop-shadow(0 0 6px #FF6B35);
        }
        50% {
          fill: #FFB366;
          filter: drop-shadow(0 0 6px #FF6B35) drop-shadow(0 0 12px #FF8C42);
        }
      }
      @media (prefers-color-scheme: dark) {
        .bg-flame {
          opacity: 0.12;
        }
        .title {
          fill: #F3F4F6;
        }
        .subtitle {
          fill: #D1D5DB;
        }
        .features {
          fill: #D1D5DB;
        }
        .charcoal {
          stroke: #F3F4F6;
          fill: #F3F4F6;
        }
        @keyframes glow {
          0%, 100% {
            fill: #FF8C42;
            filter: drop-shadow(0 0 4px #FF6B35) drop-shadow(0 0 8px #FF6B35);
          }
          50% {
            fill: #FFB366;
            filter: drop-shadow(0 0 8px #FF6B35) drop-shadow(0 0 16px #FF8C42);
          }
        }
      }
    </style>
  </defs>
