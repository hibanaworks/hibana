name: quality-gates

on:
  push:
  pull_request:

jobs:
  final-form:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          MIRI_TOOLCHAIN="$(< .github/miri-toolchain)"
          rustup toolchain install "${MIRI_TOOLCHAIN}" --profile minimal --component miri --component rust-src
      - name: Run final-form gates
        run: bash ./.github/scripts/run_final_form_gates.sh
