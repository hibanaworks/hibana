name: quality-gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rust-src
          targets: thumbv6m-none-eabi
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Policy surface hygiene gate
        run: ./.github/scripts/check_policy_surface_hygiene.sh
      - name: Management boundary gate
        run: ./.github/scripts/check_mgmt_boundary.sh
      - name: Plane boundary gate
        run: bash ./.github/scripts/check_plane_boundaries.sh
      - name: Resolver context surface gate
        run: ./.github/scripts/check_resolver_context_surface.sh
      - name: Topology hygiene gate
        run: ./.github/scripts/check_topology_hygiene.sh
      - name: Lowering hygiene gate
        run: ./.github/scripts/check_lowering_hygiene.sh
      - name: Compiled descriptor authority gate
        run: ./.github/scripts/check_compiled_descriptor_authority.sh
      - name: Frozen image hygiene gate
        run: bash ./.github/scripts/check_frozen_image_hygiene.sh
      - name: Summary authority hygiene gate
        run: ./.github/scripts/check_summary_authority_hygiene.sh
      - name: Exact layout hygiene gate
        run: bash ./.github/scripts/check_exact_layout_hygiene.sh
      - name: Raw future hygiene gate
        run: bash ./.github/scripts/check_raw_future_hygiene.sh
      - name: Message monomorphization hygiene gate
        run: bash ./.github/scripts/check_message_monomorphization_hygiene.sh
      - name: Message-heavy matrix gate
        run: bash ./.github/scripts/check_message_heavy_matrix.sh
      - name: Route frontier owner gate
        run: bash ./.github/scripts/check_route_frontier_owner.sh
      - name: Surface hygiene gate
        run: ./.github/scripts/check_surface_hygiene.sh
      - name: Public surface budget gate
        run: ./.github/scripts/check_public_surface_budget.sh
      - name: Boundary contracts gate
        run: ./.github/scripts/check_boundary_contracts.sh
      - name: Warning-free gate
        run: ./.github/scripts/check_warning_free.sh
      - name: Direct projection binary gate
        run: ./.github/scripts/check_direct_projection_binary.sh
      - name: no_std build gate
        run: ./.github/scripts/check_no_std_build.sh
      - name: Huge choreography compile budget gate
        run: ./.github/scripts/check_huge_choreography_budget.sh
      - name: Subsystem budget gate
        run: ./.github/scripts/check_subsystem_budget_gates.sh
      - name: Pico size matrix gate
        run: ./.github/scripts/check_pico_size_matrix.sh
      - name: Pico smoke gate
        run: bash ./.github/scripts/check_pico_smoke.sh
      - name: Cargo check
        run: cargo check --all-targets -p hibana
      - name: Cargo check no_std lib
        run: cargo check --no-default-features --lib -p hibana
      - name: Cargo test std
        run: cargo test -p hibana --features std
      - name: UI gate
        run: cargo test -p hibana --test ui --features std
      - name: Policy replay gate
        run: cargo test -p hibana --test policy_replay --features std
      - name: Public surface guards gate
        run: cargo test -p hibana --test public_surface_guards --features std
      - name: Substrate surface gate
        run: cargo test -p hibana --test substrate_surface --features std
      - name: Docs surface gate
        run: cargo test -p hibana --test docs_surface --features std

  semantic-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - name: Stable public API gate
        run: bash ./.github/scripts/check_hibana_public_api.sh
