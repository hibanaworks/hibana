name: quality-gates

on:
  push:
  pull_request:

jobs:
  kani:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Kani and CBMC
        run: |
          KANI_VERSION="$(< .github/kani-version)"
          cargo install --locked kani-verifier --version "${KANI_VERSION}"
          cargo kani setup
      - name: Run Kani proofs
        run: bash ./.github/scripts/check_kani.sh

  final-form:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep
          MIRI_TOOLCHAIN="$(< .github/miri-toolchain)"
          rustup toolchain install "${MIRI_TOOLCHAIN}" --profile minimal --component miri --component rust-src
          ELAN_VERSION="4.2.3"
          ELAN_ARCHIVE="elan-aarch64-unknown-linux-gnu.tar.gz"
          ELAN_SHA256="cb69af0803b04157bc30201c29c12fca882bb3ad8b43476b8d2d3064810bc3ac"
          ELAN_TMP="$(mktemp -d)"
          ELAN_PATH="${ELAN_TMP}/${ELAN_ARCHIVE}"
          curl --proto '=https' --tlsv1.2 -sSfL \
            "https://github.com/leanprover/elan/releases/download/v${ELAN_VERSION}/${ELAN_ARCHIVE}" \
            -o "${ELAN_PATH}"
          echo "${ELAN_SHA256}  ${ELAN_PATH}" | sha256sum --check -
          tar -xzf "${ELAN_PATH}" -C "${ELAN_TMP}"
          "${ELAN_TMP}/elan-init" -y --default-toolchain none
          rm -rf "${ELAN_TMP}"
          echo "${HOME}/.elan/bin" >> "${GITHUB_PATH}"
      - name: Run final-form gates
        run: bash ./.github/scripts/run_final_form_gates.sh
